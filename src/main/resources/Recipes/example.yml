# 此文档无法更改, 仅支持复制, 可在 config.yml 中选择是否加载此配方
id: "示例配方" # 必须有, 如果出现重复会把相关的配方全部禁用

# 控制配方消耗品, 每个列表元素代表了一个物品
required_item:
  - inner_id: "example_1" # 该物品的内部识别值, 支持多种物品拥有同一个值
    amount: 1 # 消耗的数量
    name: "example 1" # 物品的显示名称 (随便填)
  - inner_id: "example_2"
    amount: 10
    name: "example 2"

# 控制最终得到的奖励
reward:
  男人: # 奖品的识别名, 必填
    desc: "说 man what can i say" # 奖品描述, 不填就会显示 "/"
    command: # 奖品列表
      - "say man"
      - "say what can i say"
    weight: 40 # 抽到这个奖品的权重
  什么:
    command:
      - "give {player} stone 1"
    weight: 15
  没东西: # 像这种只有个概率的会有默认显示的描述, 且无奖励
    weight: 5

# 控制概率增减的物品配置
lucky:
  lucky_vine: # 加成物品的识别值
    amount: 1 # 需要消耗的数量, 不够会自动被卸下来
    # 概率操控公式, 格式需遵守 "奖品识别名(接任意空格):(接任意空格)表达式", 支持用别的奖品识别名作为变量
    # 如果识别名不存在的话可能会报错, 请务必注意
    # 计算后的权重会以百分比概率的形式展现, 并默认为降序排列
    # 权重低于0则算作0
    formula:
      - "男人: 男人 + 10"
      - "没东西: 没东西 - 100"
  v: # 支持一个配方多种加成物
    amount: 1
    formula:
      - "没东西: 什么 + 1000"